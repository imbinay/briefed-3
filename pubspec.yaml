name: briefed
description: Daily News Quiz - Stay Briefed. Stay Sharp.
version: 1.0.5+6
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.2.3

  # Fonts
  google_fonts: ^6.2.1

  # Sharing
  share_plus: ^9.0.0

  # Screenshot for share cards
  screenshot: ^3.0.0

  # Confetti
  confetti: ^0.7.0

  # Loading shimmer
  shimmer: ^3.0.0

  # Date formatting
  intl: ^0.19.0

  # URL launcher
  url_launcher: ^6.3.0

  # Path provider
  path_provider: ^2.1.3

  # Audio
  audioplayers: ^6.0.0

  # Ads
  google_mobile_ads: ^5.1.0

  # Icons
  cupertino_icons: ^1.0.6
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.1
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
